name: Retry failed Pages build

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Request a rebuild even if the last build succeeded (token test)
        type: boolean
        default: false

permissions:
  pages: write
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Rebuild Pages if last build errored
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FORCE: ${{ inputs.force }}
        run: |
          if ! latest=$(gh api "repos/$GH_REPO/pages/builds/latest" 2>&1); then
            echo "Could not fetch latest Pages build; skipping this run: $latest"
            exit 0
          fi
          status=$(jq -r .status <<<"$latest")
          echo "Latest Pages build status: $status"
          if [ "$status" != "errored" ] && [ "$FORCE" != "true" ]; then
            exit 0
          fi

          jq -r '.error.message // empty' <<<"$latest"
          sha=$(jq -r .commit <<<"$latest")

          attempts=$(gh api "repos/$GH_REPO/pages/builds?per_page=30" \
            --jq "[.[] | select(.commit==\"$sha\" and .status==\"errored\")] | length")
          if [ "$attempts" -ge 3 ]; then
            echo "Commit $sha already failed $attempts times; skipping retry until a new commit."
            exit 0
          fi

          echo "Requesting Pages rebuild for $sha (errored builds so far: $attempts)"
          gh api -X POST "repos/$GH_REPO/pages/builds"
